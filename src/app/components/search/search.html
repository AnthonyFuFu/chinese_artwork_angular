<div class="search-container">
  <!-- 輸入框 -->
  <input type="text" placeholder="搜尋..." 
    class="search-input" 
    [(ngModel)]="searchTerm" 
    (keyup.enter)="onSearch()">
  
  <!-- 搜索按鈕 -->
  <button type="button" 
    class="search-button" 
    aria-label="搜尋" 
    (click)="onSearch()">
    <mat-icon class="search-icon">search</mat-icon>
  </button>
</div>
