<div class="relative w-48">
  <!-- 輸入框 -->
  <input type="text" placeholder="搜尋..." 
    class="w-full py-1 pl-3 pr-10 text-sm bg-white border border-gray-300 rounded-full outline-none text-gray-700" 
    [(ngModel)]="searchTerm" 
    (keyup.enter)="onSearch()">
  
  <!-- 搜索按鈕 -->
  <button type="button" 
    class="absolute right-3 top-1/2 transform -translate-y-1/2 focus:outline-none" 
    aria-label="搜尋" 
    (click)="onSearch()">
    <svg xmlns="http://www.w3.org/2000/svg" 
      class="h-4 w-4 text-gray-500 hover:text-blue-600 transition-colors" 
      fill="none" 
      viewBox="0 0 24 24" 
      stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
    </svg>
  </button>
</div>
